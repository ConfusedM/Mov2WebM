name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "Mov2WebM"
          --clean
          converter.py

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          python -c "
          import zipfile, shutil, os
          with zipfile.ZipFile('ffmpeg.zip') as zf:
              for name in zf.namelist():
                  if name.endswith('/ffmpeg.exe'):
                      with zf.open(name) as src, open('dist/ffmpeg.exe', 'wb') as dst:
                          shutil.copyfileobj(src, dst)
                      break
          "

      - name: Create release zip
        run: |
          cd dist
          Compress-Archive -Path "Mov2WebM.exe", "ffmpeg.exe" -DestinationPath "../Mov2WebM-Windows.zip"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: Mov2WebM-Windows.zip
          generate_release_notes: true
